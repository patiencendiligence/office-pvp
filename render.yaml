services:
  - type: web
    name: office-pvp-server
    runtime: node
    rootDir: server
    # Client must be built first; server serves ../client/dist (see server/src/index.ts).
    buildCommand: cd ../client && npm install && npm run build && cd ../server && npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
